# kllmgate 配置示例
#
# 复制为 config.toml 后修改使用：
#   cp config.example.toml config.toml
#
# 启动：
#   python -m kllmgate --config config.toml

# ─── OpenAI 官方 ───
[providers.openai_official]
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"          # 从环境变量读取 API key
protocol = "openai"
wire_api = "chat"                   # "chat" | "responses"
timeout_seconds = 120
max_retries = 2
models = ["gpt-4.1", "gpt-4o-mini"]

# ─── Anthropic 官方 ───
[providers.anthropic_official]
base_url = "https://api.anthropic.com"
env_key = "ANTHROPIC_API_KEY"
protocol = "anthropic"
timeout_seconds = 120
max_retries = 2
models = ["claude-sonnet-4-20250514"]

# ─── MiniMax 代理（XML 工具调用风格） ───
[providers.minimax_proxy]
base_url = "https://api.scnet.cn/api/llm/v1"
# api_key = "sk-xxx"               # 直接配置 API key（优先级高于 env_key）
env_key = "SCNET_API_KEY"           # api_key 未配置时从此环境变量读取
protocol = "openai"
wire_api = "chat"
tool_style = "minimax_xml"          # "standard" | "minimax_xml"
timeout_seconds = 120
max_retries = 5

# ─── 字段说明 ───
#
# base_url         上游 API 地址，末尾不含 /
# api_key          直接配置的 API key（优先级高于 env_key）
# env_key          API key 的环境变量名
# protocol         "openai" | "anthropic"
# wire_api         "chat" | "responses" | "messages"（anthropic 固定为 messages）
# tool_style       "standard" | "minimax_xml"（默认 standard）
# timeout_seconds  请求超时秒数（默认 120）
# max_retries      最大重试次数（默认 2）
# models           模型白名单，不配置则不限制
