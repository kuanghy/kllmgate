# kllmgate 配置示例
# cp config.example.toml config.toml && python -m kllmgate --config config.toml

# [server]
# host = "0.0.0.0"
# port = 8500
# log_level = "info"                    # debug | info | warning | error
# default_provider = "openai_official"  # 未指定 provider 时的兜底
# models_list = ["MiniMax-M2.5"]        # models 端点白名单（OpenAI/Anthropic 共用候选集）

# 裸模型名 → provider/model，供不支持 "/" 的客户端（如 Codex）
[model_aliases]
"MiniMax-M2.5" = "minimax_proxy/MiniMax-M2.5"

[providers.openai_official]
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"
protocol = "openai"
wire_api = "chat"                       # chat | responses
timeout_seconds = 120
max_retries = 2
models = ["gpt-4.1", "gpt-4o-mini"]

[providers.anthropic_official]
base_url = "https://api.anthropic.com"
env_key = "ANTHROPIC_API_KEY"
protocol = "anthropic"
timeout_seconds = 120
max_retries = 2
models = ["claude-sonnet-4"]

# MiniMax 代理，XML 工具调用
[providers.minimax_proxy]
base_url = "https://api.scnet.cn/api/llm/v1"
# api_key = "sk-xxx"
env_key = "SCNET_API_KEY"
protocol = "openai"
wire_api = "chat"
tool_style = "minimax_xml"              # standard | minimax_xml
timeout_seconds = 120
max_retries = 5

# DeepSeek 本地（vLLM/Ollama 等，原生 token 工具调用）
# [providers.deepseek_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"
# timeout_seconds = 300
# max_retries = 1

# DeepSeek + Qwen 混合格式（如 DeepSeek-R1-0528-Qwen3-8B）
# [providers.deepseek_qwen_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek_qwen"
# thinking_style = "lvl_entry"
# timeout_seconds = 300
# max_retries = 1

# DeepSeek-R1 / QwQ（<think> 标签）
# [providers.deepseek_r1_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"
# thinking_style = "think"
# timeout_seconds = 300
# max_retries = 1

# DeepSeek 原生 thinking token（<|thinking|>）
# [providers.deepseek_thinking_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"
# thinking_style = "thinking_token"
# timeout_seconds = 300
# max_retries = 1

# 字段速查：base_url（末尾无 /）、api_key、env_key、protocol（openai|anthropic）
# wire_api（chat|responses|messages）、tool_style、thinking_style、models、models_list
# thinking_style: think | thinking_token | lvl_entry | disabled
#
# 模型路由（优先级从高到低）：
# 1. model = "provider/model"
# 2. model_aliases 裸名
# 3. X-KLLMGate-Provider 请求头 + 裸名
# 4. default_provider 兜底
