# kllmgate 配置示例
#
# 复制为 config.toml 后修改使用：
#   cp config.example.toml config.toml
#
# 启动：
#   python -m kllmgate --config config.toml

# ─── 服务配置 ───
# 所有字段均可选，host/port/log_level 可被 CLI 参数覆盖
# [server]
# host = "0.0.0.0"                      # 监听地址（默认 0.0.0.0）
# port = 8500                           # 监听端口（默认 8500）
# log_level = "info"                    # 日志级别（默认 info）：debug | info | warning | error
# default_provider = "openai_official"  # 客户端未指定 provider 时的兜底路由（可选）

# ─── OpenAI 官方 ───
[providers.openai_official]
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"          # 从环境变量读取 API key
protocol = "openai"
wire_api = "chat"                   # "chat" | "responses"
timeout_seconds = 120
max_retries = 2
models = ["gpt-4.1", "gpt-4o-mini"]

# ─── Anthropic 官方 ───
[providers.anthropic_official]
base_url = "https://api.anthropic.com"
env_key = "ANTHROPIC_API_KEY"
protocol = "anthropic"
timeout_seconds = 120
max_retries = 2
models = ["claude-sonnet-4-20250514"]

# ─── MiniMax 代理（XML 工具调用风格） ───
[providers.minimax_proxy]
base_url = "https://api.scnet.cn/api/llm/v1"
# api_key = "sk-xxx"               # 直接配置 API key（优先级高于 env_key）
env_key = "SCNET_API_KEY"           # api_key 未配置时从此环境变量读取
protocol = "openai"
wire_api = "chat"
tool_style = "minimax_xml"          # "standard" | "minimax_xml"
timeout_seconds = 120
max_retries = 5

# ─── DeepSeek 本地部署（原生 token 工具调用风格） ───
# 适用于通过 vLLM、Ollama 等框架本地部署的 DeepSeek 模型，
# 当部署框架未将模型原生工具调用 token 解析为结构化 tool_calls 时使用
# [providers.deepseek_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"              # 解析 DeepSeek 原生 token 格式的工具调用
# timeout_seconds = 300
# max_retries = 1

# ─── DeepSeek + Qwen 混合格式（双格式工具调用） ───
# 适用于混合使用两种工具调用格式的模型，
# 如 DeepSeek-R1 蒸馏到 Qwen 架构的模型（DeepSeek-R1-0528-Qwen3-8B 等）
# [providers.deepseek_qwen_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek_qwen"         # 同时解析 DeepSeek + Qwen 两种格式
# thinking_style = "lvl_entry"         # 提取 <lvl_N_entry> 思考标签为 reasoning_content
# timeout_seconds = 300
# max_retries = 1

# ─── DeepSeek-R1 本地推理模型 ───
# 适用于输出 <think> 标签的推理模型（DeepSeek-R1、QwQ 等）
# [providers.deepseek_r1_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"
# thinking_style = "think"             # 提取 <think> 思考标签为 reasoning_content
# timeout_seconds = 300
# max_retries = 1

# ─── DeepSeek 原生 thinking token 模型 ───
# 适用于输出 <|thinking|> 特殊 token 的模型（部分推理框架渲染为 < | thinking | >）
# [providers.deepseek_thinking_local]
# base_url = "http://localhost:8000/v1"
# api_key = "not-needed"
# protocol = "openai"
# wire_api = "chat"
# tool_style = "deepseek"
# thinking_style = "thinking_token"    # 提取 <|thinking|> 特殊 token 为 reasoning_content
# timeout_seconds = 300
# max_retries = 1

# ─── 模型别名 ───
# 将裸模型名映射到 provider/model 全限定名
# 适用于不支持 "/" 的客户端（如 Codex），客户端发送裸模型名即可路由
[model_aliases]
"MiniMax-M2.5" = "minimax_proxy/MiniMax-M2.5"
# "gpt-4.1" = "openai_official/gpt-4.1"

# ─── 字段说明 ───
#
# base_url         上游 API 地址，末尾不含 /
# api_key          直接配置的 API key（优先级高于 env_key）
# env_key          API key 的环境变量名
# protocol         "openai" | "anthropic"
# wire_api         "chat" | "responses" | "messages"（anthropic 固定为 messages）
# tool_style       "standard" | "minimax_xml" | "deepseek" | "qwen" | "deepseek_qwen"（默认 standard）
# thinking_style   "disabled" | "think" | "thinking_token" | "lvl_entry"（默认 disabled）
#                  - think:           提取 <think>...</think> 标签（DeepSeek-R1、QwQ 等）
#                  - thinking_token:  提取 <|thinking|> 特殊 token（DeepSeek 原生格式）
#                  - lvl_entry:       提取 <lvl_N_entry> 标签（DeepSeek-R1 蒸馏模型）
# timeout_seconds  请求超时秒数（默认 120）
# max_retries      最大重试次数（默认 2）
# models           模型白名单，不配置则不限制
#
# ─── 客户端模型路由 ───
#
# 客户端指定模型提供商有四种方式（按优先级从高到低）：
#
# 1. model 字段使用 provider/model 格式：
#      { "model": "openai_official/gpt-4.1" }
#
# 2. 配置 [model_aliases] 将裸模型名映射到 provider/model：
#      [model_aliases]
#      "MiniMax-M2.5" = "minimax_proxy/MiniMax-M2.5"
#    客户端发送 { "model": "MiniMax-M2.5" } 即可
#
# 3. 通过 X-KLLMGate-Provider 请求头指定：
#      X-KLLMGate-Provider: minimax_proxy
#    配合裸模型名 { "model": "MiniMax-M2.5" } 使用
#
# 4. 在 [server] 段配置 default_provider 作为兜底路由：
#      [server]
#      default_provider = "openai_official"
#    客户端无需指定 provider，裸模型名直接路由到默认 provider
